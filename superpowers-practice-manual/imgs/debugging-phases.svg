<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#4a5568"/></marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#e53e3e"/></marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#dd6b20"/></marker>
    <filter id="shadow"><feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.1"/></filter>
  </defs>

  <rect width="900" height="480" fill="#f7fafc" rx="8"/>

  <text x="450" y="26" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a202c">systematic-debugging 四阶段流程</text>
  <text x="450" y="43" text-anchor="middle" font-size="9" fill="#718096">必须按顺序执行 · 不得跳过 · Phase 4.5 在 3 次修复失败后触发</text>

  <!-- ===== Phase 1 ===== -->
  <rect x="30" y="60" width="175" height="130" rx="6" fill="#ebf8ff" stroke="#3182ce" stroke-width="2" filter="url(#shadow)"/>
  <rect x="30" y="60" width="175" height="28" rx="6" fill="#3182ce"/>
  <rect x="30" y="80" width="175" height="8" fill="#3182ce"/>
  <text x="117" y="78" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Phase 1: 重现</text>
  <text x="45" y="108" font-size="9" font-weight="bold" fill="#2b6cb0">目标：稳定重现 bug</text>
  <text x="45" y="122" font-size="8" fill="#4a5568">· 写能重现的测试</text>
  <text x="45" y="135" font-size="8" fill="#4a5568">· 确认失败条件</text>
  <text x="45" y="148" font-size="8" fill="#4a5568">· 记录预期 vs 实际</text>
  <text x="45" y="161" font-size="8" fill="#718096">⛔ 不得猜测原因</text>
  <text x="45" y="175" font-size="8" fill="#718096">⛔ 不得开始修复</text>

  <!-- Arrow 1→2 -->
  <line x1="205" y1="125" x2="240" y2="125" stroke="#4a5568" stroke-width="1.8" marker-end="url(#arrow)"/>

  <!-- ===== Phase 2 ===== -->
  <rect x="245" y="60" width="175" height="130" rx="6" fill="#faf5ff" stroke="#805ad5" stroke-width="2" filter="url(#shadow)"/>
  <rect x="245" y="60" width="175" height="28" rx="6" fill="#805ad5"/>
  <rect x="245" y="80" width="175" height="8" fill="#805ad5"/>
  <text x="332" y="78" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Phase 2: 定位</text>
  <text x="260" y="108" font-size="9" font-weight="bold" fill="#6b46c1">目标：找到根因</text>
  <text x="260" y="122" font-size="8" fill="#4a5568">· 读日志 / 堆栈</text>
  <text x="260" y="135" font-size="8" fill="#4a5568">· 缩小范围</text>
  <text x="260" y="148" font-size="8" fill="#4a5568">· 形成假设</text>
  <text x="260" y="161" font-size="8" fill="#718096">⛔ 不得同时测多假设</text>
  <text x="260" y="175" font-size="8" fill="#718096">⛔ 不得修改代码</text>

  <!-- Arrow 2→3 -->
  <line x1="420" y1="125" x2="455" y2="125" stroke="#4a5568" stroke-width="1.8" marker-end="url(#arrow)"/>

  <!-- ===== Phase 3 ===== -->
  <rect x="460" y="60" width="175" height="130" rx="6" fill="#fffaf0" stroke="#dd6b20" stroke-width="2" filter="url(#shadow)"/>
  <rect x="460" y="60" width="175" height="28" rx="6" fill="#dd6b20"/>
  <rect x="460" y="80" width="175" height="8" fill="#dd6b20"/>
  <text x="547" y="78" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Phase 3: 修复</text>
  <text x="475" y="108" font-size="9" font-weight="bold" fill="#c05621">目标：针对性修复</text>
  <text x="475" y="122" font-size="8" fill="#4a5568">· 最小化改动</text>
  <text x="475" y="135" font-size="8" fill="#4a5568">· 重跑失败测试</text>
  <text x="475" y="148" font-size="8" fill="#4a5568">· 验证不引入新 bug</text>
  <text x="475" y="161" font-size="8" fill="#718096">⛔ 不得顺手重构</text>
  <text x="475" y="175" font-size="8" fill="#718096">⛔ 不得跳过测试</text>

  <!-- Arrow 3→4 -->
  <line x1="635" y1="125" x2="670" y2="125" stroke="#4a5568" stroke-width="1.8" marker-end="url(#arrow)"/>

  <!-- ===== Phase 4 ===== -->
  <rect x="675" y="60" width="195" height="130" rx="6" fill="#f0fff4" stroke="#38a169" stroke-width="2" filter="url(#shadow)"/>
  <rect x="675" y="60" width="195" height="28" rx="6" fill="#38a169"/>
  <rect x="675" y="80" width="195" height="8" fill="#38a169"/>
  <text x="772" y="78" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Phase 4: 验证</text>
  <text x="690" y="108" font-size="9" font-weight="bold" fill="#276749">目标：确认修复有效</text>
  <text x="690" y="122" font-size="8" fill="#4a5568">· 原失败测试现在通过</text>
  <text x="690" y="135" font-size="8" fill="#4a5568">· 全量回归测试</text>
  <text x="690" y="148" font-size="8" fill="#4a5568">· 写防回归测试</text>
  <text x="690" y="161" font-size="8" fill="#718096">⛔ 不得仅靠"看起来对"</text>
  <text x="690" y="175" font-size="8" fill="#718096">⛔ 不得跳过回归</text>

  <!-- ===== Phase 4.5 trigger condition ===== -->
  <!-- Failure loop from Phase 3 back to Phase 2 -->
  <path d="M 547 190 Q 547 220 332 220 Q 260 220 260 195" stroke="#e53e3e" stroke-width="1.5" fill="none" stroke-dasharray="5,3" marker-end="url(#arrowRed)"/>
  <text x="420" y="236" text-anchor="middle" font-size="9" fill="#e53e3e">修复后仍失败 → 重新定位</text>

  <!-- Phase 4.5 box -->
  <rect x="200" y="265" width="500" height="145" rx="6" fill="#fff5f5" stroke="#e53e3e" stroke-width="2.5" filter="url(#shadow)"/>
  <rect x="200" y="265" width="500" height="30" rx="6" fill="#e53e3e"/>
  <rect x="200" y="287" width="500" height="8" fill="#e53e3e"/>
  <text x="450" y="286" text-anchor="middle" font-size="12" font-weight="bold" fill="white">⚡ Phase 4.5: 架构性重新评估（触发条件：连续 3+ 次修复失败）</text>
  <text x="215" y="318" font-size="10" font-weight="bold" fill="#c53030">强制停止尝试 → 重新思考问题本质</text>
  <text x="215" y="338" font-size="9" fill="#4a5568">1. 假设：是否从一开始就定位错了根因？</text>
  <text x="215" y="353" font-size="9" fill="#4a5568">2. 范围：是否是更深层的设计缺陷，而非单点 bug？</text>
  <text x="215" y="368" font-size="9" fill="#4a5568">3. 依赖：是否外部库 / 框架版本导致？</text>
  <text x="215" y="383" font-size="9" fill="#4a5568">4. 方向：是否需要 writing-plans 重新拆解任务再执行？</text>
  <text x="215" y="398" font-size="9" font-weight="bold" fill="#c53030">→ 执行完评估后，从 Phase 1 重新开始</text>

  <!-- Trigger arrow from Phase 3 down to Phase 4.5 -->
  <path d="M 547 190 Q 547 252 450 262" stroke="#e53e3e" stroke-width="2" fill="none" marker-end="url(#arrowRed)"/>
  <rect x="550" y="210" width="130" height="26" rx="4" fill="#fff5f5" stroke="#e53e3e" stroke-width="1"/>
  <text x="615" y="227" text-anchor="middle" font-size="9" font-weight="bold" fill="#e53e3e">3+ 次修复失败</text>

  <!-- Phase 4.5 → back to Phase 1 loop -->
  <path d="M 200 380 Q 60 380 60 200 Q 60 125 25 125" stroke="#e53e3e" stroke-width="1.5" fill="none" stroke-dasharray="5,3" marker-end="url(#arrowRed)"/>
  <text x="50" y="310" text-anchor="middle" font-size="8" fill="#e53e3e" transform="rotate(-90,50,310)">重新开始</text>

  <!-- Success path label -->
  <text x="450" y="458" text-anchor="middle" font-size="9" fill="#38a169" font-weight="bold">✅ Phase 4 全通过 → 调试完成，提交修复</text>
  <line x1="772" y1="190" x2="772" y2="440" stroke="#38a169" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowRed)"/>
  <path d="M 772 440 Q 772 455 450 455" stroke="#38a169" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
</svg>
