<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#4a5568"/></marker>
    <filter id="shadow"><feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.1"/></filter>
  </defs>

  <rect width="800" height="400" fill="#f7fafc" rx="8"/>

  <text x="400" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a202c">Plan vs TDD：核心矛盾与妥协方案</text>

  <!-- Left box: writing-plans -->
  <rect x="30" y="55" width="340" height="120" rx="8" fill="white" stroke="#3182ce" stroke-width="2" filter="url(#shadow)"/>
  <text x="200" y="80" text-anchor="middle" font-size="13" font-weight="bold" fill="#2b6cb0">writing-plans</text>
  <text x="50" y="105" font-size="11" fill="#4a5568">• Complete code in every step</text>
  <text x="50" y="125" font-size="11" fill="#4a5568">• “if a step changes code, show the code”</text>
  <text x="50" y="145" font-size="11" fill="#4a5568">• No placeholders: no TBD, no TODO</text>
  <text x="50" y="165" font-size="10" fill="#a0aec0">目的：消除执行者理解歧义</text>

  <!-- Right box: TDD -->
  <rect x="430" y="55" width="340" height="120" rx="8" fill="white" stroke="#e53e3e" stroke-width="2" filter="url(#shadow)"/>
  <text x="600" y="80" text-anchor="middle" font-size="13" font-weight="bold" fill="#c53030">test-driven-development</text>
  <text x="450" y="105" font-size="11" fill="#4a5568">• NO production code without failing test</text>
  <text x="450" y="125" font-size="11" fill="#4a5568">• “Delete means delete” — no reference code</text>
  <text x="450" y="145" font-size="11" fill="#4a5568">• Iron Law: RED before GREEN</text>
  <text x="450" y="165" font-size="10" fill="#a0aec0">目的：测试驱动发现实现细节</text>

  <!-- Conflict symbol -->
  <text x="400" y="118" text-anchor="middle" font-size="28" fill="#e53e3e">⚡</text>
  <text x="400" y="138" text-anchor="middle" font-size="9" font-weight="bold" fill="#e53e3e">直接矛盾</text>

  <!-- Arrow to resolution -->
  <line x1="400" y1="180" x2="400" y2="215" stroke="#4a5568" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Resolution box -->
  <rect x="130" y="220" width="540" height="160" rx="8" fill="white" stroke="#38a169" stroke-width="2" filter="url(#shadow)"/>
  <text x="400" y="248" text-anchor="middle" font-size="13" font-weight="bold" fill="#2f855a">✅ 妥协方案（本次实践采用）</text>

  <rect x="155" y="265" width="240" height="100" rx="6" fill="#f0fff4"/>
  <text x="275" y="285" text-anchor="middle" font-size="11" font-weight="bold" fill="#2f855a">Plan 的新定位</text>
  <text x="165" y="305" font-size="9" fill="#4a5568">• 接口地图：函数签名、类型</text>
  <text x="165" y="322" font-size="9" fill="#4a5568">• 边界约定：文件位置、依赖</text>
  <text x="165" y="339" font-size="9" fill="#4a5568">• 测试蓝图：test case + 预期值</text>
  <text x="165" y="356" font-size="9" fill="#a0aec0">不再写“完整实现代码”</text>

  <rect x="420" y="265" width="225" height="100" rx="6" fill="#fff5f5"/>
  <text x="532" y="285" text-anchor="middle" font-size="11" font-weight="bold" fill="#c53030">TDD 的职责</text>
  <text x="430" y="305" font-size="9" fill="#4a5568">• RED: 按 plan 写测试</text>
  <text x="430" y="322" font-size="9" fill="#4a5568">• GREEN: 从测试发现实现</text>
  <text x="430" y="339" font-size="9" fill="#4a5568">• REFACTOR: 清理重复</text>
  <text x="430" y="356" font-size="9" fill="#a0aec0">Plan 给WHAT，TDD 找 HOW</text>

  <!-- Bottom: outcome -->
  <text x="400" y="395" text-anchor="middle" font-size="9" fill="#718096">实际效果：一期 subagent 拿到完整代码跳过 TDD → 二期 inline 执行严格走 RED→GREEN</text>
</svg>