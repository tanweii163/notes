<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Agent 工程演进：从组件堆叠到控制权设计</title>
  <desc id="desc">展示 Agent 任务控制系统、观察决策执行验证闭环、Runtime、Domain Harness、Environment 与可信控制面的关系。</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.55" stop-color="#0a1628"/>
      <stop offset="1" stop-color="#10162b"/>
    </linearGradient>
    <linearGradient id="titleGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#67e8f9"/>
      <stop offset="0.52" stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="runtimeGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0f2941"/>
      <stop offset="1" stop-color="#162447"/>
    </linearGradient>
    <linearGradient id="harnessGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#12283c"/>
      <stop offset="1" stop-color="#202247"/>
    </linearGradient>
    <linearGradient id="environmentGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#172334"/>
      <stop offset="1" stop-color="#242039"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000814" flood-opacity="0.45"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrowCyan" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 Z" fill="#67e8f9"/>
    </marker>
    <marker id="arrowSoft" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 Z" fill="#7890b4"/>
    </marker>
    <style>
      text { font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; }
      .eyebrow { font-size: 18px; font-weight: 700; letter-spacing: 3px; fill: #67e8f9; }
      .main-title { font-size: 46px; font-weight: 800; fill: url(#titleGradient); }
      .subtitle { font-size: 21px; fill: #9fb0c8; }
      .section-label { font-size: 18px; font-weight: 700; letter-spacing: 2px; fill: #90a4c2; }
      .box-title { font-size: 24px; font-weight: 800; fill: #f8fafc; }
      .box-sub { font-size: 16px; fill: #aebdd2; }
      .flow-title { font-size: 21px; font-weight: 800; fill: #f8fafc; }
      .flow-en { font-size: 14px; font-weight: 700; letter-spacing: 1.5px; fill: #8ea4c2; }
      .flow-desc { font-size: 15px; fill: #c8d5e6; }
      .chip { font-size: 15px; font-weight: 700; fill: #dce8f6; }
      .side-title { font-size: 25px; font-weight: 800; fill: #f4f7fb; }
      .side-item { font-size: 17px; font-weight: 650; fill: #d5dfed; }
      .footer-title { font-size: 21px; font-weight: 800; fill: #f8fafc; }
      .footer-copy { font-size: 17px; fill: #b7c5d8; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1600" height="1000" fill="url(#bg)"/>
  <circle cx="1430" cy="70" r="240" fill="#7c3aed" opacity="0.08"/>
  <circle cx="110" cy="900" r="280" fill="#06b6d4" opacity="0.07"/>
  <path d="M0 145 H1600" stroke="#20324a" stroke-width="1"/>

  <!-- Header -->
  <text x="80" y="55" class="eyebrow">AGENT ENGINEERING EVOLUTION</text>
  <text x="80" y="108" class="main-title">从组件堆叠到控制权设计</text>
  <text x="80" y="139" class="subtitle">核心问题不是“还缺哪个组件”，而是：下一步由模型、程序、规则还是人来决定？</text>

  <!-- Main system panel -->
  <rect x="70" y="175" width="1135" height="620" rx="28" fill="#0b1829" stroke="#243854" stroke-width="2" filter="url(#shadow)"/>
  <text x="105" y="215" class="section-label">TASK CONTROL SYSTEM · 任务控制系统</text>

  <!-- Controllers -->
  <rect x="105" y="235" width="1065" height="74" rx="18" fill="#0f2035" stroke="#2a415f"/>
  <text x="130" y="265" class="box-sub">控制权由多种控制者共同承担，并根据任务状态动态切换</text>

  <g>
    <rect x="130" y="276" width="198" height="42" rx="21" fill="#123447" stroke="#22d3ee" stroke-opacity="0.7"/>
    <circle cx="153" cy="297" r="6" fill="#67e8f9"/>
    <text x="169" y="303" class="chip">模型 · Model</text>

    <rect x="352" y="276" width="216" height="42" rx="21" fill="#162c48" stroke="#60a5fa" stroke-opacity="0.65"/>
    <circle cx="375" cy="297" r="6" fill="#60a5fa"/>
    <text x="391" y="303" class="chip">程序 · Workflow</text>

    <rect x="592" y="276" width="205" height="42" rx="21" fill="#272447" stroke="#a78bfa" stroke-opacity="0.65"/>
    <circle cx="615" cy="297" r="6" fill="#a78bfa"/>
    <text x="631" y="303" class="chip">规则 · Policy</text>

    <rect x="821" y="276" width="210" height="42" rx="21" fill="#34243d" stroke="#f472b6" stroke-opacity="0.65"/>
    <circle cx="844" cy="297" r="6" fill="#f472b6"/>
    <text x="860" y="303" class="chip">人工 · Human</text>
  </g>

  <!-- Goal and loop -->
  <rect x="105" y="345" width="155" height="132" rx="22" fill="#132438" stroke="#4f6d91" stroke-width="1.5"/>
  <text x="130" y="381" class="flow-en">GOAL &amp; STATE</text>
  <text x="130" y="414" class="flow-title">目标与状态</text>
  <text x="130" y="444" class="flow-desc">任务契约</text>
  <text x="130" y="466" class="flow-desc">完成条件</text>

  <line x1="261" y1="411" x2="300" y2="411" stroke="#67e8f9" stroke-width="3" marker-end="url(#arrowCyan)"/>

  <g filter="url(#shadow)">
    <rect x="310" y="345" width="180" height="132" rx="22" fill="#103043" stroke="#22d3ee" stroke-width="1.7"/>
    <text x="336" y="378" class="flow-en">OBSERVE</text>
    <text x="336" y="411" class="flow-title">观察</text>
    <text x="336" y="440" class="flow-desc">Context · Memory</text>
    <text x="336" y="462" class="flow-desc">RAG · 环境反馈</text>

    <rect x="525" y="345" width="180" height="132" rx="22" fill="#162b47" stroke="#60a5fa" stroke-width="1.7"/>
    <text x="551" y="378" class="flow-en">DECIDE</text>
    <text x="551" y="411" class="flow-title">决策</text>
    <text x="551" y="440" class="flow-desc">Prompt · Reasoning</text>
    <text x="551" y="462" class="flow-desc">Plan · 路径选择</text>

    <rect x="740" y="345" width="180" height="132" rx="22" fill="#222747" stroke="#a78bfa" stroke-width="1.7"/>
    <text x="766" y="378" class="flow-en">ACT</text>
    <text x="766" y="411" class="flow-title">行动</text>
    <text x="766" y="440" class="flow-desc">Tool · Skill · MCP</text>
    <text x="766" y="462" class="flow-desc">API · 业务动作</text>

    <rect x="955" y="345" width="180" height="132" rx="22" fill="#302540" stroke="#f472b6" stroke-width="1.7"/>
    <text x="981" y="378" class="flow-en">VERIFY</text>
    <text x="981" y="411" class="flow-title">验证</text>
    <text x="981" y="440" class="flow-desc">Eval · Test · Rule</text>
    <text x="981" y="462" class="flow-desc">结果 · 副作用</text>
  </g>

  <line x1="491" y1="411" x2="515" y2="411" stroke="#7890b4" stroke-width="3" marker-end="url(#arrowSoft)"/>
  <line x1="706" y1="411" x2="730" y2="411" stroke="#7890b4" stroke-width="3" marker-end="url(#arrowSoft)"/>
  <line x1="921" y1="411" x2="945" y2="411" stroke="#7890b4" stroke-width="3" marker-end="url(#arrowSoft)"/>
  <path d="M1045 345 C1045 322, 400 322, 400 340" fill="none" stroke="#67e8f9" stroke-width="2.5" stroke-dasharray="7 7" marker-end="url(#arrowCyan)"/>
  <text x="667" y="334" text-anchor="middle" class="flow-en" fill="#67e8f9">LOOP · 根据反馈继续、结束或转交</text>

  <!-- Runtime -->
  <rect x="105" y="510" width="1030" height="72" rx="18" fill="url(#runtimeGradient)" stroke="#315176"/>
  <text x="130" y="540" class="box-title">Runtime</text>
  <text x="130" y="567" class="box-sub">Loop · State · Session · Retry · Checkpoint · Scheduler · Trace</text>
  <text x="1105" y="552" text-anchor="end" class="box-sub">驱动计算与持续执行</text>

  <!-- Harness -->
  <rect x="105" y="600" width="1030" height="72" rx="18" fill="url(#harnessGradient)" stroke="#4d497a"/>
  <text x="130" y="630" class="box-title">Domain Harness</text>
  <text x="130" y="657" class="box-sub">状态可观察 · 动作语义 · 权限边界 · 即时反馈 · 结果验证 · 失败恢复</text>
  <text x="1105" y="642" text-anchor="end" class="box-sub">将真实世界改造成 Agent 友好的任务界面</text>

  <!-- Environment -->
  <rect x="105" y="690" width="1030" height="72" rx="18" fill="url(#environmentGradient)" stroke="#59456b"/>
  <text x="130" y="720" class="box-title">Environment</text>
  <text x="130" y="747" class="box-sub">用户 · 代码库 · 数据库 · CRM / HIS · 云服务 · 物理世界</text>
  <text x="1105" y="732" text-anchor="end" class="box-sub">Agent 所观察和改变的真实世界</text>

  <!-- Vertical data flow arrows -->
  <path d="M1146 477 L1146 503" stroke="#7890b4" stroke-width="2" marker-end="url(#arrowSoft)"/>
  <path d="M1146 582 L1146 593" stroke="#7890b4" stroke-width="2" marker-end="url(#arrowSoft)"/>
  <path d="M1146 672 L1146 683" stroke="#7890b4" stroke-width="2" marker-end="url(#arrowSoft)"/>

  <!-- Trust and control plane -->
  <rect x="1235" y="175" width="295" height="620" rx="28" fill="#12182a" stroke="#68468f" stroke-width="2" filter="url(#shadow)"/>
  <rect x="1256" y="198" width="253" height="72" rx="18" fill="#251c3b" stroke="#a855f7" stroke-opacity="0.75"/>
  <text x="1280" y="228" class="section-label" fill="#c084fc">TRUST &amp; CONTROL</text>
  <text x="1280" y="254" class="side-title">可信控制面</text>

  <g>
    <rect x="1265" y="296" width="235" height="52" rx="14" fill="#182239" stroke="#364a68"/>
    <circle cx="1290" cy="322" r="7" fill="#67e8f9"/>
    <text x="1310" y="328" class="side-item">Policy · Safety</text>

    <rect x="1265" y="362" width="235" height="52" rx="14" fill="#182239" stroke="#364a68"/>
    <circle cx="1290" cy="388" r="7" fill="#60a5fa"/>
    <text x="1310" y="394" class="side-item">Privacy · Evidence</text>

    <rect x="1265" y="428" width="235" height="52" rx="14" fill="#1c203b" stroke="#4a4774"/>
    <circle cx="1290" cy="454" r="7" fill="#a78bfa"/>
    <text x="1310" y="460" class="side-item">Permission · Audit</text>

    <rect x="1265" y="494" width="235" height="52" rx="14" fill="#242038" stroke="#594363"/>
    <circle cx="1290" cy="520" r="7" fill="#f472b6"/>
    <text x="1310" y="526" class="side-item">Eval · Verifier</text>

    <rect x="1265" y="560" width="235" height="52" rx="14" fill="#2a2035" stroke="#684058"/>
    <circle cx="1290" cy="586" r="7" fill="#fb7185"/>
    <text x="1310" y="592" class="side-item">Human-in-the-loop</text>

    <rect x="1265" y="626" width="235" height="52" rx="14" fill="#2a2035" stroke="#684058"/>
    <circle cx="1290" cy="652" r="7" fill="#f59e0b"/>
    <text x="1310" y="658" class="side-item">Compliance · 责任</text>
  </g>

  <text x="1382" y="714" text-anchor="middle" class="box-sub">不是最后出现的一层，</text>
  <text x="1382" y="739" text-anchor="middle" class="box-sub">而是从第一天贯穿所有环节</text>
  <path d="M1235 392 H1208" stroke="#c084fc" stroke-width="2" stroke-dasharray="5 6"/>
  <path d="M1235 548 H1208" stroke="#c084fc" stroke-width="2" stroke-dasharray="5 6"/>
  <path d="M1235 636 H1208" stroke="#c084fc" stroke-width="2" stroke-dasharray="5 6"/>
  <path d="M1235 726 H1208" stroke="#c084fc" stroke-width="2" stroke-dasharray="5 6"/>

  <!-- Footer insight -->
  <rect x="70" y="830" width="1460" height="112" rx="26" fill="#0d1c2d" stroke="#294563" stroke-width="1.5"/>
  <rect x="91" y="852" width="8" height="68" rx="4" fill="url(#titleGradient)"/>
  <text x="125" y="868" class="footer-title">演进主线：控制权从预定义程序，部分转移到模型的运行时判断</text>
  <text x="125" y="900" class="footer-copy">终局并非“完全自主”，而是 Adaptive Agency：根据风险、可观察性、动作可逆性与结果可验证性，动态收放模型控制权。</text>
  <text x="125" y="926" class="footer-copy">真正的工程壁垒，是设计由模型、程序、规则、环境和人共同控制，并能可靠完成真实任务的系统。</text>

  <!-- Decorative corners -->
  <path d="M35 88 V35 H88" fill="none" stroke="#2b526f" stroke-width="2"/>
  <path d="M1512 965 H1565 V912" fill="none" stroke="#4a376b" stroke-width="2"/>
</svg>
